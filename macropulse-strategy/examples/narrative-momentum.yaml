        - - Statutory Effective Date
          - January 18, 2027 marks the statutory effective date of the GENIUS Act.
            From this day, any new stable
          - https://www.kucoin.com/blog/jp-2026-genius-act-the-latest-status-and-update
          - 18 January 2027
          - 'The GENIUS Act, signed into law in July 2025, establishes the first federal
            framework for U.S. payment stablecoins, aiming to integrate them into
            the regulated banking system. As of March 2026, the Office of the Comptroller
            of the Currency (OCC) has issued its Notice of Proposed Rulemaking (NPRM)
            to operationalize the Act. The Act is set to take full effect by January
            18, 2027, or 120 days after final regulations are published, with a three-year
            grace period ending July 18, 2028, for full compliance.


            Key provisions include:

            - Stablecoins must be backed 1:1 by high-quality liquid assets (e.g.,
            U.S. Treasuries, central bank reserves).

            - Payment stablecoins are reclassified as neither securities nor commodities
            but as unique instruments under banking regulators (OCC, Federal Reserve).

            - Issuers must maintain 100% reserves and provide holders with legal priority
            in insolvency, similar to bank deposits.

            - Strict AML/KYC requirements and technical ability to "freeze and burn"
            assets upon law enforcement request.

            - A "rebuttable presumption" (the "Yield Ban") prohibits issuers and affiliates
            from paying interest or rewards on stablecoins; indirect rewards are also
            scrutinized.

            - Issuers with over $10 billion in circulation must transition to federal
            supervision; smaller issuers remain under state-certified regimes.

            - Minimum capital floor for issuers is $5 million.


            Timeline milestones:

            - July 18, 2025: Act enacted.

            - February 25, 2026: OCC releases 376-page NPRM detailing capital requirements
            and licensing.

            - May 2026: 60-day comment period for industry feedback ends.

            - January 18, 2027: Statutory effective date; new issuances must comply.

            - July 18, 2028: All secondary market trading must be in compliant tokens.


            The Act brings legitimacy and user protection but centralizes the market,
            raises compliance costs, and restricts yield opportunities. U.S. exchanges
            must delist non-compliant stablecoins by 2027. The Act applies only to
            payment stablecoins, not all cryptocurrencies.'
