      description: "## What Is BNB?\n\n[BNB](https://www.bnbchain.org/en/what-is-bnb)\
        \ is the native coin of the BNB Chain ecosystem, essential for powering its\
        \ multifaceted Web3 environment. It supports transactions on the BNB Smart\
        \ Chain (BSC), the [opBNB L2s](https://opbnb.bnbchain.org/en?ref=bnbchain.ghost.io),\
        \ and [BNB Greenfield](https://www.bnbchain.org/en/greenfield?ref=bnbchain.ghost.io)\
        \ . Besides transaction fees, BNB serves as a governance token, granting holders\
        \ the ability to participate in the BNB Chain\u2019s decentralized on-chain\
        \ governance. \n\nAdditionally, BNB functions as a [strategic reserve asset](https://www.bnbchain.org/en/blog/bhutan-embraces-bnb-as-a-strategic-reserve)\
        \ and plays a critical role in the BNB Executive Total Value Locked (TVL)\
        \ campaign, driving ecosystem growth and incentivizing adoption.  \n\nOriginally\
        \ launched in 2017 as Binance\u2019s exchange token, BNB was designed to offer\
        \ trading fee discounts and other utilities within the Binance platform. It\
        \ later evolved into the foundational asset of a much broader ecosystem. \
        \ Following its mainnet launch on April 18, 2019, BNB transitioned from the\
        \ Ethereum Network to BNB Chain. \"Build and Build\" is the philosophy behind\
        \ BNB, reflecting its role in fostering development within the ecosystem.\
        \ \n\n### What Is BNB\u2019s Auto Burn?\n\nBNB employs an Auto-Burn system\
        \ to gradually reduce its total supply to 100,000,000 BNB. The burn amount\
        \ is adjusted based on BNB's price and the number of blocks generated on BSC\
        \ during a quarter, ensuring transparency and predictability.\n"
