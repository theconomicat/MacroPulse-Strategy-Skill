        - - GENIUS Act Final Regulation Deadline
          - Under the GENIUS Act, federal banking agencies must finalize stablecoin
            regulations by July 18, 2026
          - https://news.bitcoin.com/fdic-proposes-genius-act-rules-for-bank-stablecoin-issuers-11-reserves-and-2-day-redemptions-required
          - 18 July 2026
          - "The Federal Deposit Insurance Corporation (FDIC) approved a notice of\
            \ proposed rulemaking on April 7, 2026, to implement GENIUS Act standards\
            \ for bank-affiliated stablecoin issuers, known as permitted payment stablecoin\
            \ issuers (PPSIs). PPSIs, typically subsidiaries of FDIC-supervised insured\
            \ depository institutions, must hold 1:1 reserves in eligible assets\u2014\
            such as U.S. currency, bank balances, short-term Treasuries, and certain\
            \ money market funds\u2014backing all outstanding stablecoins. These reserves\
            \ must be monitored daily, segregated from other assets, and counterparty\
            \ exposure is capped at 40% of total reserves. PPSIs must demonstrate\
            \ the ability to quickly access and convert reserves to cash.\n\nRedemption\
            \ requests must be fulfilled within two business days, and PPSIs must\
            \ publicly disclose their redemption policy. For redemptions exceeding\
            \ 10% of outstanding issuance in 24 hours, PPSIs must notify the FDIC\
            \ and may request an extension. New PPSIs face a $5 million minimum capital\
            \ requirement for their first three years, with ongoing capital in common\
            \ equity tier 1 and additional tier 1 instruments only; no Tier 2 capital\
            \ is allowed. Parent banks must deconsolidate PPSI subsidiaries for regulatory\
            \ capital purposes. PPSIs must also maintain a separate pool of highly\
            \ liquid assets equal to 12 months of operating expenses. Failure to meet\
            \ capital or liquidity requirements triggers mandatory FDIC notification\
            \ and possible suspension of new issuance.\n\nThe rule requires comprehensive\
            \ cybersecurity and annual AML/CFT certifications. PPSI reserves held\
            \ as deposits at insured banks are insured only up to $250,000 as corporate\
            \ deposits, with no pass-through coverage for individual holders, reflecting\
            \ the GENIUS Act\u2019s prohibition on deposit insurance for stablecoin\
            \ holders. Tokenized deposits meeting the legal definition of \"deposit\"\
            \ receive standard insurance treatment. The FDIC is accepting public comments\
            \ for 60 days, with the rule taking effect by Jan. 18, 2027, or 120 days\
            \ after final regulations, whichever is sooner."
