        - - SEC Decision Deadline for Grayscale ETF Options Proposal
          - The SEC must approve or disapprove the NYSE American proposal to list
            options on the Grayscale Coind
          - https://news.bitcoin.com/sec-opens-proceedings-on-nyse-proposal-to-list-grayscale-crypto-etf-options
          - 11 July 2026
          - "The SEC has initiated proceedings to review NYSE American LLC\u2019s\
            \ proposal to list options on the Grayscale Coindesk Crypto 5 ETF, which\
            \ is composed of 76.02% bitcoin and 14.90% ethereum. The proposal, submitted\
            \ December 29, aims to expand institutional access to digital asset derivatives\
            \ by allowing trading of physically settled, American-style options tied\
            \ to this diversified crypto basket. The SEC\u2019s April 9 order, under\
            \ Release No. 34-105187, launches a structured review process with statutory\
            \ deadlines: public comments are due 21 days after Federal Register publication,\
            \ rebuttals within 35 days, and a decision required by July 11, potentially\
            \ extendable to September 9 for further analysis. NYSE American asserts\
            \ that existing surveillance and reporting systems can handle the increased\
            \ trading activity and that infrastructure capacity is sufficient, aligning\
            \ with current derivatives market standards.\n\nRegulatory scrutiny is\
            \ focused on whether the proposal meets investor protection and market\
            \ integrity standards, particularly compliance with Section 6(b)(5) of\
            \ the Exchange Act, which mandates safeguards against fraudulent and manipulative\
            \ practices. The SEC\u2019s review mirrors previous hesitations regarding\
            \ derivatives tied to markets lacking uniform oversight. The Commission\
            \ has opened a public comment period, inviting industry participants to\
            \ weigh in on whether the proposed rule change aligns with regulatory\
            \ requirements. The SEC emphasized, \u201CInstitution of proceedings does\
            \ not indicate that the Commission has reached any conclusions with respect\
            \ to any of the issues involved.\u201D The outcome of this review could\
            \ influence future ETF derivatives and is seen as critical for institutional\
            \ adoption amid growing interest in crypto derivatives. Treasury Secretary\
            \ Scott Bessent and SEC Chair Paul Atkins are also urging Congress to\
            \ advance crypto legislation to secure U.S. market leadership."
